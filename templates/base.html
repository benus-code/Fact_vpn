<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}VPN Billing{% endblock %}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<style>
  body { background: #f4f6f9; font-family: system-ui, sans-serif; }
  .navbar { background: #1a1a2e !important; }
  .navbar-brand { color: #e94560 !important; font-weight: 700; letter-spacing: 1px; }
  .nav-link { color: #ccc !important; }
  .nav-link:hover { color: #fff !important; }
  .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
  .badge-active   { background: #28a745; }
  .badge-expire   { background: #dc3545; }
  .badge-warning  { background: #fd7e14; }
  .peer-badge { font-size: .75rem; padding: 3px 8px; border-radius: 20px; }
  .peer-on  { background:#d4edda; color:#155724; }
  .peer-off { background:#f8d7da; color:#721c24; }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">🔐 VPN Billing</a>
    {% if session.user_id %}
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-light">{{ session.user_nom }}</span>
      {% if session.is_admin %}
        <a href="{{ url_for('admin_panel') }}" class="btn btn-sm btn-outline-warning">Admin</a>
      {% endif %}
      <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-light">Déconnexion</a>
    </div>
    {% endif %}
  </div>
</nav>

<div class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
